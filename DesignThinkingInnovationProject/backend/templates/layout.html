<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }} | TrustCheck 2.0</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='styles.css') }}" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="{{ request.url_for('home') }}">
          <span class="brand-mark">T2</span>
          <span>
            <strong>TrustCheck 2.0</strong>
            <small>Hybrid fake review detection</small>
          </span>
        </a>
        <nav class="nav">
          <a href="{{ request.url_for('home') }}">Home</a>
          <a href="{{ request.url_for('dashboard') }}">Dashboard</a>
          <a href="{{ request.url_for('history') }}">History</a>
          <a href="/docs">API Docs</a>
        </nav>
      </header>

      {% block content %}{% endblock %}

      <footer class="footer">
        Built for CSET210 DTI • FastAPI + NLP feature fusion • TrustCheck 2.0
      </footer>
    </div>
  </body>
</html>
